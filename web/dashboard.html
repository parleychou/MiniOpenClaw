<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Bridge - 飞书聊天监控</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366F1;
            --primary-light: #818CF8;
            --primary-dark: #4F46E5;
            --secondary: #8B5CF6;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-tertiary: #334155;
            --bg-card: #1E293B;
            
            --text-primary: #F1F5F9;
            --text-secondary: #CBD5E1;
            --text-muted: #64748B;
            
            --border: rgba(148, 163, 184, 0.1);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* 主布局 */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: 320px;
            min-width: 320px;
            max-width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .app-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .app-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .app-title h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--success);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 统计卡片 */
        .stats-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 过滤器 */
        .filters {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .filter-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .filter-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-btn {
            padding: 12px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
        }

        .filter-btn i {
            width: 20px;
            text-align: center;
        }

        /* 操作按钮 */
        .actions {
            padding: 20px;
            margin-top: auto;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-primary);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /* 主聊天区域 */
        .chat-area {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 32px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chat-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .icon-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 消息容器 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            min-height: 0;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* 日期分隔符 */
        .date-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0;
        }

        .date-divider::before,
        .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .date-divider span {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            gap: 12px;
            animation: messageSlide 0.3s ease;
            max-width: 85%;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
            color: white;
        }

        .message-avatar.user {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .message-avatar.assistant {
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
        }

        .message-avatar.system {
            background: linear-gradient(135deg, var(--warning), #D97706);
        }

        .message-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message.user .message-body {
            align-items: flex-end;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .message.user .message-meta {
            flex-direction: row-reverse;
        }

        .message-sender {
            font-weight: 600;
            color: var(--text-secondary);
        }

        .message-time {
            color: var(--text-muted);
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            word-break: break-word;
            max-width: 100%;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.system .message-bubble {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 12px;
        }

        .message-bubble pre {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            overflow-x: auto;
            font-size: 13px;
        }

        .message-bubble code {
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
        }

        .message.assistant .message-bubble code {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
        }

        /* 空状态 */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 加载状态 */
        .loading-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--bg-tertiary);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 输入区域 */
        .input-area {
            padding: 20px 32px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            width: 100%;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            min-height: 48px;
            max-height: 200px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            transition: all 0.2s ease;
            overflow-y: auto;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-primary);
        }

        .message-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-hint i {
            color: var(--primary);
        }

        .input-hint kbd {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .sidebar {
                width: 280px;
                min-width: 280px;
                max-width: 280px;
            }
            
            .messages-container {
                padding: 24px;
            }
            
            .chat-header {
                padding: 16px 24px;
            }
            
            .input-area {
                padding: 16px 24px;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                width: 280px;
                min-width: 280px;
                max-width: 280px;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            .message {
                max-width: 95%;
            }

            .messages-container {
                padding: 20px 16px;
            }

            .chat-header {
                padding: 16px 20px;
            }

            .input-area {
                padding: 16px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .sidebar {
                width: 100%;
                min-width: 100%;
                max-width: 100%;
            }
            
            .messages-container {
                padding: 16px 12px;
            }
            
            .chat-header {
                padding: 12px 16px;
            }
            
            .input-area {
                padding: 12px 16px;
            }
            
            .message-bubble {
                padding: 12px 14px;
                font-size: 13px;
            }
        }

        /* 工具提示 */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            margin-bottom: 8px;
        }

        .tooltip:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="app-title">
                    <div class="app-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div>
                        <h1>Agent Bridge</h1>
                    </div>
                </div>
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span>服务运行中</span>
                </div>
            </div>

            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-value" id="totalMessages">0</div>
                    <div class="stat-label">总消息</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="userMessages">0</div>
                    <div class="stat-label">用户</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="assistantMessages">0</div>
                    <div class="stat-label">助手</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="systemMessages">0</div>
                    <div class="stat-label">系统</div>
                </div>
            </div>

            <div class="filters">
                <div class="filter-label">过滤消息</div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-role="all" onclick="setFilter('all')">
                        <i class="fas fa-list"></i>
                        <span>全部消息</span>
                    </button>
                    <button class="filter-btn" data-role="user" onclick="setFilter('user')">
                        <i class="fas fa-user"></i>
                        <span>用户消息</span>
                    </button>
                    <button class="filter-btn" data-role="assistant" onclick="setFilter('assistant')">
                        <i class="fas fa-robot"></i>
                        <span>助手回复</span>
                    </button>
                    <button class="filter-btn" data-role="system" onclick="setFilter('system')">
                        <i class="fas fa-cog"></i>
                        <span>系统消息</span>
                    </button>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="loadMessages()">
                    <i class="fas fa-sync-alt"></i>
                    <span>刷新</span>
                </button>
                <button class="btn btn-secondary" id="autoRefreshBtn" onclick="toggleAutoRefresh()">
                    <i class="fas fa-clock"></i>
                    <span>自动刷新</span>
                </button>
                <button class="btn btn-danger" onclick="clearMessages()">
                    <i class="fas fa-trash"></i>
                    <span>清空记录</span>
                </button>
            </div>
        </aside>

        <!-- 主聊天区域 -->
        <main class="chat-area">
            <header class="chat-header">
                <div>
                    <div class="chat-title">飞书聊天记录</div>
                    <div class="chat-subtitle">实时监控 Agent 对话</div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn tooltip" data-tooltip="刷新" onclick="loadMessages()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button class="icon-btn tooltip" id="autoRefreshIcon" data-tooltip="自动刷新" onclick="toggleAutoRefresh()">
                        <i class="fas fa-clock"></i>
                    </button>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">加载聊天记录...</div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea 
                            class="message-input" 
                            id="messageInput" 
                            placeholder="输入消息发送给 Agent..."
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                        ></textarea>
                    </div>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送 (Enter)">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-hint">
                    <i class="fas fa-info-circle"></i>
                    <span><kbd>Enter</kbd> 发送 · <kbd>Shift+Enter</kbd> 换行</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        let autoRefreshInterval = null;
        let currentFilter = 'all';
        let lastMessageCount = 0;
        let lastMessageTimestamp = null; // 记录最后一条消息的时间戳
        let isAutoRefreshEnabled = true; // 默认启用自动刷新

        // 过滤测试数据
        function isTestMessage(msg) {
            const testPatterns = [
                /ou_test_user/i,
                /oc_test_chat/i,
                /test_event/i,
                /test_msg/i,
                /om_test/i,
                /测试消息/i
            ];
            
            const content = msg.content || '';
            const metadata = JSON.stringify(msg.metadata || {});
            
            return testPatterns.some(pattern => 
                pattern.test(content) || pattern.test(metadata)
            );
        }

        function setFilter(role) {
            currentFilter = role;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.role === role);
            });
            
            // 强制刷新（因为过滤条件改变了）
            loadMessages(true);
        }

        async function loadMessages(forceUpdate = false) {
            const container = document.getElementById('messagesContainer');
            
            // 保存当前滚动位置
            const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;

            try {
                const response = await fetch('/api/chat/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: currentFilter, type: 'all', limit: 200 })
                });

                const data = await response.json();

                if (data.messages && data.messages.length > 0) {
                    // 过滤掉测试消息
                    const realMessages = data.messages.filter(msg => !isTestMessage(msg));
                    
                    if (realMessages.length > 0) {
                        // 按时间排序，最新的在最下面
                        realMessages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                        
                        // 获取最新消息的时间戳
                        const latestTimestamp = realMessages[realMessages.length - 1].timestamp;
                        
                        // 检查是否有新内容
                        const hasNewMessages = realMessages.length !== lastMessageCount || 
                                              latestTimestamp !== lastMessageTimestamp;
                        
                        // 只在有新内容或强制更新时才刷新 DOM
                        if (hasNewMessages || forceUpdate) {
                            lastMessageCount = realMessages.length;
                            lastMessageTimestamp = latestTimestamp;
                            
                            // 更新消息容器的内容
                            container.innerHTML = renderMessages(realMessages);
                            
                            // 如果之前在底部或有新消息，滚动到底部
                            if (wasAtBottom || hasNewMessages) {
                                setTimeout(() => {
                                    container.scrollTop = container.scrollHeight;
                                }, 50);
                            }
                            
                            // 更新统计
                            updateStats(realMessages);
                        }
                        // 如果没有新内容，不做任何 DOM 操作
                    } else {
                        if (lastMessageCount !== 0 || forceUpdate) {
                            showEmptyState(container);
                            lastMessageCount = 0;
                            lastMessageTimestamp = null;
                        }
                    }
                } else {
                    if (lastMessageCount !== 0 || forceUpdate) {
                        showEmptyState(container);
                        lastMessageCount = 0;
                        lastMessageTimestamp = null;
                    }
                }
                
            } catch (error) {
                // 只在首次加载失败时显示错误，避免频繁刷新时闪烁
                if (lastMessageCount === 0 || forceUpdate) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">
                                <i class="fas fa-exclamation-triangle"></i>
                            </div>
                            <h3>加载失败</h3>
                            <p>${error.message}</p>
                        </div>
                    `;
                }
            }
        }

        function showEmptyState(container) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <i class="fas fa-inbox"></i>
                    </div>
                    <h3>暂无聊天记录</h3>
                    <p>等待飞书消息...</p>
                </div>
            `;
        }

        function updateStats(messages) {
            const stats = {
                total: messages.length,
                user: messages.filter(m => m.role === 'user').length,
                assistant: messages.filter(m => m.role === 'assistant').length,
                system: messages.filter(m => m.role === 'system').length
            };

            document.getElementById('totalMessages').textContent = stats.total;
            document.getElementById('userMessages').textContent = stats.user;
            document.getElementById('assistantMessages').textContent = stats.assistant;
            document.getElementById('systemMessages').textContent = stats.system;
        }

        function renderMessages(messages) {
            let html = '';
            let lastDate = '';

            messages.forEach(msg => {
                const msgDate = new Date(msg.timestamp).toLocaleDateString('zh-CN');
                
                // 添加日期分隔符
                if (msgDate !== lastDate) {
                    html += `
                        <div class="date-divider">
                            <span>${msgDate}</span>
                        </div>
                    `;
                    lastDate = msgDate;
                }

                html += renderMessage(msg);
            });

            return html;
        }

        function renderMessage(msg) {
            const avatarIcons = {
                user: '<i class="fas fa-user"></i>',
                assistant: '<i class="fas fa-robot"></i>',
                system: '<i class="fas fa-cog"></i>'
            };

            const roleNames = {
                user: '用户',
                assistant: 'Agent',
                system: '系统'
            };

            const time = new Date(msg.timestamp).toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit'
            });
            
            let content = escapeHtml(msg.content);

            // 处理代码块
            if (content.includes('```')) {
                content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            }

            // 处理行内代码
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 处理换行
            content = content.replace(/\n/g, '<br>');

            return `
                <div class="message ${msg.role}">
                    <div class="message-avatar ${msg.role}">
                        ${avatarIcons[msg.role]}
                    </div>
                    <div class="message-body">
                        <div class="message-meta">
                            <span class="message-sender">${roleNames[msg.role]}</span>
                            <span class="message-time">${time}</span>
                        </div>
                        <div class="message-bubble">${content}</div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function clearMessages() {
            if (!confirm('确定要清空所有聊天记录吗？此操作不可恢复。')) return;

            try {
                await fetch('/api/chat/clear', { method: 'POST' });
                lastMessageCount = 0;
                lastMessageTimestamp = null;
                loadMessages(true); // 强制刷新
            } catch (error) {
                alert('清空失败: ' + error.message);
            }
        }

        function toggleAutoRefresh() {
            const btn = document.getElementById('autoRefreshBtn');
            const icon = document.getElementById('autoRefreshIcon');

            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                isAutoRefreshEnabled = false;
                btn.classList.remove('active');
                icon.classList.remove('active');
            } else {
                loadMessages(true); // 强制刷新一次
                autoRefreshInterval = setInterval(loadMessages, 2000); // 2秒刷新一次（不强制）
                isAutoRefreshEnabled = true;
                btn.classList.add('active');
                icon.classList.add('active');
            }
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const message = input.value.trim();

            if (!message) return;

            // 禁用输入和按钮
            input.disabled = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                if (data.success) {
                    // 清空输入框
                    input.value = '';
                    input.style.height = 'auto';
                    
                    // 立即强制刷新消息列表
                    await loadMessages(true);
                    
                    // 如果自动刷新未启用，启动临时轮询等待回复
                    if (!isAutoRefreshEnabled) {
                        let pollCount = 0;
                        const pollInterval = setInterval(async () => {
                            await loadMessages(); // 轮询时不强制刷新
                            pollCount++;
                            // 轮询30次（60秒）后停止
                            if (pollCount >= 30) {
                                clearInterval(pollInterval);
                            }
                        }, 2000);
                    }
                } else {
                    alert('发送失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('发送失败: ' + error.message);
            } finally {
                // 重新启用输入和按钮
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        // 处理键盘事件
        function handleKeyDown(event) {
            // Enter 发送消息（不按 Shift）
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
            // Shift+Enter 换行（默认行为）
        }

        // 自动调整输入框高度
        const messageInput = document.getElementById('messageInput');
        
        function adjustInputHeight() {
            messageInput.style.height = 'auto';
            const maxHeight = Math.min(window.innerHeight * 0.3, 200); // 最大高度为屏幕的30%或200px
            messageInput.style.height = Math.min(messageInput.scrollHeight, maxHeight) + 'px';
        }
        
        messageInput.addEventListener('input', adjustInputHeight);
        
        // 监听窗口大小变化
        window.addEventListener('resize', adjustInputHeight);

        // 初始加载
        loadMessages(true); // 首次加载强制刷新
        
        // 默认启用自动刷新
        toggleAutoRefresh();
    </script>
</body>
</html>
